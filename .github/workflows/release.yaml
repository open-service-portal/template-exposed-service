---
# Build and publish the ExposedService Crossplane Configuration package.
name: Release Configuration Package

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to use (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

env:
  REGISTRY: ghcr.io
  PACKAGE_NAME: open-service-portal/configuration-exposed-service

jobs:
  build-and-push:
    name: Build and Push Configuration Package
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Crossplane CLI
        run: |
          curl -sL https://raw.githubusercontent.com/crossplane/crossplane/master/install.sh | sh
          sudo mv crossplane /usr/local/bin/
          crossplane version 2>/dev/null || true

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      - name: Build Configuration package
        run: |
          # Stamp the version onto the XRD only (crossplane.yaml multi-line strings confuse yq).
          yq -i '.metadata.labels."openportal.dev/version" = env(VERSION)' configuration/xrd.yaml
          crossplane xpkg build \
            --package-root=configuration/ \
            --package-file=configuration-exposed-service.xpkg
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}

      - name: Push package to registry
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          crossplane xpkg push \
            --package-files=configuration-exposed-service.xpkg \
            ${{ env.REGISTRY }}/${{ env.PACKAGE_NAME }}:${VERSION}
          if [[ ! "${VERSION}" =~ -(alpha|beta|rc) ]]; then
            crossplane xpkg push \
              --package-files=configuration-exposed-service.xpkg \
              ${{ env.REGISTRY }}/${{ env.PACKAGE_NAME }}:latest
          fi

      - name: Generate catalog entry
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          cat > catalog-entry.yaml <<EOF
          ---
          apiVersion: pkg.crossplane.io/v1
          kind: Configuration
          metadata:
            name: configuration-exposed-service
            namespace: crossplane-system
          spec:
            package: ${{ env.REGISTRY }}/${{ env.PACKAGE_NAME }}:${VERSION}
            packagePullPolicy: IfNotPresent
            revisionActivationPolicy: Automatic
            revisionHistoryLimit: 3
            skipDependencyResolution: true
          EOF
          cat catalog-entry.yaml

      - name: Upload catalog entry as artifact
        uses: actions/upload-artifact@v4
        with:
          name: catalog-entry-${{ steps.version.outputs.VERSION }}
          path: catalog-entry.yaml
          retention-days: 30

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          name: Configuration ExposedService ${{ steps.version.outputs.VERSION }}
          body: |
            ## ExposedService Configuration Package ${{ steps.version.outputs.VERSION }}

            Crossplane Configuration for publishing an in-cluster Service over HTTPS via Gateway API
            (HTTPRoute), with TLS + DNS handled by the platform (shared Gateway wildcard cert + External-DNS).

            ### Installation
            ```bash
            kubectl apply -f - <<EOF
            apiVersion: pkg.crossplane.io/v1
            kind: Configuration
            metadata:
              name: configuration-exposed-service
              namespace: crossplane-system
            spec:
              package: ${{ env.REGISTRY }}/${{ env.PACKAGE_NAME }}:${{ steps.version.outputs.VERSION }}
            EOF
            ```

            Requires the per-cluster infra (Gateway API + Traefik + cert-manager DNS-01 + External-DNS)
            and a `gateway-config` EnvironmentConfig — see the platform setup (ESG-T2b).
          files: |
            configuration-exposed-service.xpkg
            catalog-entry.yaml
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
