# First consumer (US-exp-4): expose the valkey-admin Service via ExposedService.
apiVersion: openportal.dev/v1alpha1
kind: ExposedService
metadata:
  name: valkey-admin
  namespace: valkey-route-test
spec:
  serviceName: valkey-admin
  port: 8080
  hostname: valkey-admin.openportal.dev
  tls:
    enabled: true
  dns:
    proxied: false
